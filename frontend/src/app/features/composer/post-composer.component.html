<p-card>
  <ng-template pTemplate="title">{{ draftId ? 'Edit draft' : 'New draft' }}</ng-template>
  <ng-template pTemplate="subtitle">Save post copy locally. Image upload and publishing come later.</ng-template>

  @if (feedback) {
    <p-message severity="success" [text]="feedback" />
  }

  @if (loadError) {
    <p-message severity="error" [text]="loadError" />
  }

  <form class="composer-form" [formGroup]="form" (ngSubmit)="saveDraft()">
    <label for="title">Title</label>
    <input id="title" pInputText type="text" formControlName="title" autocomplete="off" />
    @if (isInvalid('title')) {
      <small class="field-error">Title is required.</small>
    }

    <label for="content">Content</label>
    <textarea id="content" pTextarea rows="10" formControlName="content"></textarea>
    @if (isInvalid('content')) {
      <small class="field-error">Content is required.</small>
    }

    <label for="scheduledFor">Scheduled for</label>
    <input id="scheduledFor" pInputText type="datetime-local" formControlName="scheduledFor" />

    <div class="form-actions">
      <button pButton type="submit" label="Save draft" icon="pi pi-save"></button>
      <button pButton type="button" label="Cancel" icon="pi pi-times" severity="secondary" outlined (click)="cancel()"></button>
    </div>
  </form>
</p-card>
